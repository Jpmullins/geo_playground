services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geodb
      POSTGRES_USER: geouser
      POSTGRES_PASSWORD: geopass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geouser -d geodb"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  telemetry-gateway:
    build:
      context: ./services/telemetry-gateway
    environment:
      PORT: "8080"
      CENTER_LAT: "37.7749"
      CENTER_LON: "-122.4194"
      RADIUS_KM: "80"
      POLL_INTERVAL_MS: "5000"
      ADSB_PROVIDER: "adsbfi"
      AISSTREAM_API_KEY: ""
      DATABASE_URL: "postgres://geouser:geopass@postgres:5432/geodb"
      REDIS_URL: "redis://redis:6379"
      OPENCLAW_GATEWAY_URL: "http://openclaw-gateway:18789"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:-}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  exec-broker:
    build:
      context: ./services/exec-broker
    environment:
      PORT: "8081"
      CMD_TIMEOUT_MS: "10000"
      MAX_OUTPUT_BYTES: "16384"
    ports:
      - "8081:8081"
    restart: unless-stopped

  search-proxy:
    build:
      context: ./services/search-proxy
    environment:
      PORT: "8082"
      SEARCH_PROVIDER: "duckduckgo"
    ports:
      - "8082:8082"
    restart: unless-stopped

  ui:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./services/ui:/app:ro
    command: ["node", "server.mjs"]
    environment:
      PORT: "3000"
      TELEMETRY_API_BASE: "http://telemetry-gateway:8080"
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - telemetry-gateway

  openclaw-gateway:
    build:
      context: ./services/openclaw-gateway
    environment:
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:-}"
      LITELLM_BASE_URL: "${LITELLM_BASE_URL:-}"
      LITELLM_API_KEY: "${LITELLM_API_KEY:-}"
      LITELLM_MODEL: "${LITELLM_MODEL:-}"
    volumes:
      - ./services/openclaw-gateway/bootstrap:/bootstrap:ro
      - openclaw_state:/root/.openclaw
    ports:
      - "18789:18789"
    depends_on:
      - telemetry-gateway
      - exec-broker
      - search-proxy
    restart: unless-stopped

  openclaw-runtime:
    build:
      context: ./services/openclaw-runtime
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    command: ["sh", "-c", "sleep infinity"]

volumes:
  pgdata:
  openclaw_state:
