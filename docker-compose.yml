services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: geoint
      POSTGRES_USER: geoint
      POSTGRES_PASSWORD: geoint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoint -d geoint"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  analysis-worker:
    build:
      context: ./services/analysis-worker
    environment:
      PORT: "8090"
      ARTIFACT_ROOT: "/data/artifacts"
      PUBLIC_BASE_URL: "http://localhost:8090"
      AIS_API_URL: ${AIS_API_URL:-}
      AIS_API_KEY: ${AIS_API_KEY:-}
      ADSB_API_URL: ${ADSB_API_URL:-https://opendata.adsb.fi/api/v2}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - worker_data:/data
    ports:
      - "8090:8090"

  agent-server:
    build:
      context: ./services/agent
    environment:
      DEFAULT_MODEL: ${DEFAULT_MODEL:-openai:gpt-4.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANALYSIS_WORKER_URL: http://analysis-worker:8090
      DEFAULT_STAC_API_URL: ${DEFAULT_STAC_API_URL:-https://planetarycomputer.microsoft.com/api/stac/v1}
      SENTINEL_HUB_BASE_URL: ${SENTINEL_HUB_BASE_URL:-https://services.sentinel-hub.com}
      SENTINEL_HUB_CLIENT_ID: ${SENTINEL_HUB_CLIENT_ID:-}
      SENTINEL_HUB_CLIENT_SECRET: ${SENTINEL_HUB_CLIENT_SECRET:-}
      AIS_API_URL: ${AIS_API_URL:-}
      AIS_API_KEY: ${AIS_API_KEY:-}
      ADSB_API_URL: ${ADSB_API_URL:-https://opendata.adsb.fi/api/v2}
    depends_on:
      - analysis-worker
    ports:
      - "2024:2024"

volumes:
  pgdata:
  minio_data:
  worker_data:
